<!doctype html>
<html lang="%lang%" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="theme-color" content="#ff5f8f" />
    <meta name="google-site-verification" content="JvryX_A978S9JADFhoqkB0fgMIrTxeP--cmYW30tsHc" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // Set theme before paint (no flash): saved choice, else system preference.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <!-- GoatCounter (privacy analytics, no cookies). SPA route changes are counted in routes/+layout.svelte. -->
    <script data-goatcounter="https://astrolab.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  </body>
</html>
